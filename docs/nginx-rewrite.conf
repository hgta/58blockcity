# 58blockcity 全站 Nginx 伪静态规则
# 说明：当前站点部署在 Nginx 上，项目里的 .htaccess 对 Nginx 无效。
# 请把以下 rewrite 规则粘贴到对应域名的 server 块中（或 include 本文件）。

# ============================================================
# 0. Cloudflare CDN 全局配置
# 添加到 nginx.conf 的 http 块中
# ============================================================
# Cloudflare IP 段 — 还原真实用户 IP
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ============================================================
# 1. www.58.tl 主站
# 根目录建议：/www/wwwroot/58git/58blockcity
# ============================================================
server {
    listen 80;
    listen 443 ssl;
    server_name www.58.tl 58.tl;

    # root 请按实际部署路径修改
    root /www/wwwroot/58git/58blockcity;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 城市详情页
    rewrite ^/city/([a-z]+)\.html$ /city.php?pinyin=$1 last;

    # 商城商品/店铺（兼容旧 URL）
    rewrite ^/mall/product/([0-9]+)-.*\.html$ /mall/product/detail.php?id=$1 last;
    rewrite ^/mall/shop/([0-9]+)-.*\.html$ /mall/shop/view.php?id=$1 last;

    # Sitemap
    rewrite ^/sitemap\.xml$ /sitemap.php last;

    # PHP 处理（请按实际 PHP 版本调整）
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param HTTPS $http_x_forwarded_proto;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}

# ============================================================
# 2. mall.58.tl 商城子站
# 根目录建议：/www/wwwroot/58git/58blockcity/mall
# ============================================================
server {
    listen 80;
    listen 443 ssl;
    server_name mall.58.tl;

    root /www/wwwroot/58git/58blockcity/mall;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 商品详情伪静态
    rewrite ^/product/([0-9]+)-.*\.html$ /product/detail.php?id=$1 last;

    # 店铺详情伪静态
    rewrite ^/shop/([0-9]+)-.*\.html$ /shop/view.php?id=$1 last;

    # 模特详情伪静态
    rewrite ^/model/([0-9]+)-.*\.html$ /model/view.php?id=$1 last;

    # 商品分类列表（可选）
    rewrite ^/product/category/([0-9]+)-.*\.html$ /product/list.php?category=$1 last;

    # Sitemap
    rewrite ^/sitemap\.xml$ /sitemap.php last;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param HTTPS $http_x_forwarded_proto;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}

